<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PerioDental Pro</title>

<link rel="manifest" href="./manifest.json">

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f6fa;
}
.container {
    padding: 15px;
}
button {
    padding: 10px;
    margin: 5px 0;
    font-size: 16px;
}
input, select {
    padding: 8px;
    margin: 4px 0;
    width: 100%;
}
.teeth {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 5px;
}
.tooth {
    padding: 10px;
    background: white;
    border: 1px solid #ccc;
    text-align: center;
    cursor: pointer;
}
.tooth.active {
    background: #0066cc;
    color: white;
}
</style>
</head>

<body>

<div class="container">

<h2>🦷 PerioDental Pro</h2>

<div>
<input id="patientName" placeholder="Nombre">
<input id="patientLastName" placeholder="Apellido">
<input id="patientDNI" placeholder="DNI">
<button onclick="addPatient()">Crear paciente</button>
</div>

<hr>

<div class="teeth" id="teeth"></div>

<hr>

<div>
<h3>Datos pieza</h3>
<input id="probeProximal" placeholder="Proximal">
<input id="probeMedio" placeholder="Medio">
<input id="probeDistal" placeholder="Distal">

<select id="bleeding">
<option value="">Sangrado</option>
<option value="1">Sí</option>
<option value="0">No</option>
</select>

<select id="plaque">
<option value="">Placa</option>
<option value="1">Sí</option>
<option value="0">No</option>
</select>

<button onclick="saveTooth()">Guardar</button>
</div>

<hr>

<button onclick="startHandsFree()">🎤 Modo manos libres</button>
<button onclick="stopVoice()">⛔ Detener</button>

</div>

<script>

// ================= ESTADO =================
let patients = [];
let currentPatient = null;
let selectedTooth = null;

let voiceRec = null;
let isListening = false;

let voiceContext = {
    currentTooth: null,
    lastValues: []
};

// ================= PACIENTES =================
function addPatient() {
    let p = {
        id: Date.now(),
        name: patientName.value,
        lastName: patientLastName.value,
        dni: patientDNI.value,
        teeth: {}
    };
    patients.push(p);
    currentPatient = p;
    alert("Paciente creado");
}

// ================= DIENTES =================
function renderTeeth() {
    let el = document.getElementById("teeth");
    el.innerHTML = "";

    for (let i = 11; i <= 48; i++) {
        if (i % 10 === 9) continue;

        let d = document.createElement("div");
        d.className = "tooth";
        d.innerText = i;
        d.onclick = () => selectTooth(i);

        if (selectedTooth === i) d.classList.add("active");

        el.appendChild(d);
    }
}

function selectTooth(n) {
    selectedTooth = n;
    voiceContext.currentTooth = n;
    renderTeeth();
}

// ================= GUARDAR =================
function saveTooth() {
    if (!currentPatient || !selectedTooth) return;

    currentPatient.teeth[selectedTooth] = {
        p: probeProximal.value,
        m: probeMedio.value,
        d: probeDistal.value,
        b: bleeding.value,
        pl: plaque.value
    };

    console.log(currentPatient);
}

// ================= VOZ =================

function normalize(text) {
    return text.toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[.,]/g, "")
        .trim();
}

function initVoice() {
    let SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return false;

    voiceRec = new SR();
    voiceRec.lang = "es-AR";
    voiceRec.continuous = false;
    voiceRec.interimResults = false;

    voiceRec.onresult = (e) => {
        let res = e.results[0][0];
        if (res.confidence < 0.6) return;

        processVoice(res.transcript);
    };

    voiceRec.onend = () => {
        if (isListening) setTimeout(() => voiceRec.start(), 400);
    };

    return true;
}

function startHandsFree() {
    if (!voiceRec) initVoice();

    isListening = true;
    voiceContext.currentTooth = 18;

    selectTooth(18);

    voiceRec.start();
    speak("modo automatico pieza 18");
}

function stopVoice() {
    isListening = false;
    if (voiceRec) voiceRec.stop();
}

// ================= PARSER =================

function processVoice(text) {
    let input = normalize(text);
    console.log("VOICE:", input);

    let tooth = detectTooth(input);
    if (tooth) {
        selectTooth(tooth);
        speak("pieza " + tooth);
        return;
    }

    if (input.includes("siguiente")) {
        navigate(1);
        return;
    }

    let nums = extractNumbers(input);
    if (nums.length) {
        applyProbe(nums);
        return;
    }

    if (input.includes("sangra")) {
        bleeding.value = input.includes("no") ? "0" : "1";
        saveTooth();
        speak("sangrado");
        return;
    }

    if (input.includes("placa")) {
        plaque.value = input.includes("no") ? "0" : "1";
        saveTooth();
        speak("placa");
        return;
    }
}

// ================= LOGICA =================

function detectTooth(text) {
    let n = parseInt(text);
    if (n >= 11 && n <= 48 && n % 10 <= 8) return n;
    return null;
}

function extractNumbers(text) {
    let nums = text.split(" ").map(n => parseInt(n)).filter(n => !isNaN(n));

    if (nums.length === 0 && /^\d{3}$/.test(text)) {
        return text.split("").map(Number);
    }

    return nums;
}

function applyProbe(vals) {
    if (!selectedTooth) return;

    probeProximal.value = vals[0] || "";
    probeMedio.value = vals[1] || "";
    probeDistal.value = vals[2] || "";

    saveTooth();

    if (navigator.vibrate) navigator.vibrate(30);

    speak("ok");

    setTimeout(() => navigate(1), 600);
}

function navigate(step) {
    let t = selectedTooth + step;
    if (t % 10 === 9) t += step;
    if (t < 11) t = 11;
    if (t > 48) t = 48;

    selectTooth(t);
}

// ================= TTS =================
function speak(text) {
    let u = new SpeechSynthesisUtterance(text);
    u.lang = "es-AR";
    speechSynthesis.speak(u);
}

// INIT
renderTeeth();

</script>

</body>
</html>
